  body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;background:var(--ivory);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}

  .meta{margin-top:14px;display:flex;flex-wrap:wrap;gap:10px}

  /* region overview */

  .rb-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px}
  .rb-cards{display:flex;flex-wrap:wrap;gap:12px}
  .rb-card{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-left-width:6px;border-radius:12px;padding:11px 18px;cursor:pointer;transition:.15s;background:#fff;min-width:150px}
  .rb-card:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(11,31,58,.1)}
  .rb-card.on{box-shadow:0 0 0 2px var(--navy) inset}
  .rb-flag{font-size:28px;line-height:1}
  .rb-name{font-size:15px;font-weight:800;color:var(--navy)}
  .rb-meta{font-size:11.5px;color:var(--muted);margin-top:3px}

  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin:0 0 24px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px}

  .bars{display:flex;flex-direction:column;gap:11px}
  .bar{display:flex;align-items:center;gap:12px;font-size:13px}
  .bar .blab{width:90px;color:#37414f;font-weight:600;display:flex;align-items:center;gap:5px;flex:0 0 auto}
  .bar .track{flex:1;background:#eef0f3;border-radius:7px;height:22px;overflow:hidden}
  .bar .fill{height:100%;border-radius:7px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11.5px;font-weight:700;min-width:22px}

  .donut-row{display:flex;align-items:center;gap:22px}
  .donut{flex:0 0 158px}
  .legend{flex:1;display:flex;flex-direction:column;gap:8px}
  .lg{display:flex;align-items:center;gap:9px;font-size:13px}
  .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .lg .nm{flex:1;color:#37414f}.lg .vl{font-weight:700;color:var(--navy)}.lg .pc{color:var(--muted);font-size:11.5px;width:36px;text-align:right}
  .segbar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin-bottom:14px;border:1px solid var(--line)}
  .segbar i{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11.5px;font-weight:700}
  .seglegend{display:grid;grid-template-columns:1fr 1fr;gap:8px}.seglegend .lg{font-size:12.5px}

  /* toolbar */

  .search{flex:1;min-width:200px;position:relative}

  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 13px;font-size:12.5px;cursor:pointer;color:#445;transition:.15s;user-select:none;display:inline-flex;align-items:center;gap:5px}

  .chip .cdot{width:9px;height:9px;border-radius:50%}

  .sec-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .sec-h .cnt{font-size:12px;color:#fff;border-radius:999px;padding:2px 10px;font-weight:700}

  .tl-sec.dim .sdot{background:var(--s-closed)} .tl-sec.dim .sec-h{color:var(--muted)} .tl-sec.dim .ev{opacity:.62} .tl-sec.dim .ev:hover{opacity:1}

  .ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .ev .status{position:absolute;top:11px;right:13px;font-size:10.5px;font-weight:700;border-radius:999px;padding:3px 9px;color:#fff;white-space:nowrap}

  .iv-tab{flex:1;border:none;background:rgba(255,255,255,.08);color:#cdd5e0;font-size:12.5px;font-weight:700;padding:8px;border-radius:9px;cursor:pointer}
  .iv-tab.on{background:var(--gold);color:#1a1205}
  .iv-pane{display:none}.iv-pane.on{display:block}
  .iv-pane.poster{background:#11161d}.iv-pane.poster img{width:100%;display:block}

  .copy-text{font-size:13.5px;line-height:1.9;color:#2a3340;white-space:pre-wrap}
  .copy-signup{margin-top:14px;padding:11px 13px;background:#faf6ec;border:1px solid #ece1c6;border-radius:10px;font-size:12.5px;color:#7a6326;font-weight:700;white-space:pre-wrap;line-height:1.7}
  .copybtn{margin-top:14px;width:100%;border:none;background:var(--navy);color:#fff;font-size:13px;font-weight:700;padding:11px;border-radius:10px;cursor:pointer}
  .copybtn:hover{background:var(--navy2)}
  .ldfail{padding:50px 20px;text-align:center;color:#cdd5e0;font-size:13px}
  .dt-rows{padding:20px 28px 24px}
  .dt-body{padding:22px 28px 26px}
  .dt-r{display:flex;gap:14px;padding:9px 0;font-size:13.5px;border-bottom:1px solid #f2f0ea}
  .dt-r:last-child{border:none}
  .dt-r .k{flex:0 0 78px;color:var(--gold-d);font-weight:700}
  .dt-r .v{flex:1;color:#33404e}
  .dt-sl{margin-top:18px;text-align:center;font-size:13px;font-weight:800;color:var(--navy)}

  @media(max-width:980px){.kpis{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}}
</style>
</head>

}

    <div class="date" style="background:${regHex(e.region)}">
      <span class="attrbar" style="background:${ATTR_HEX[e.attr]||'#888'}"></span>
      <span class="d"${undated?' style="font-size:12px"':''}>${dr}</span>
      <span class="mo">${undated?'未定档':fmtMo(e.month)}</span>
      <span class="wd">${e.weekday||''}</span>
    </div>
    <div class="body">
      <span class="status" style="background:${STATUS_HEX[e.status]||'#999'}">${e.status}</span>
      <span class="loc" style="background:${regHex(e.region)}">${regFlag(e.region)} ${e.region}</span>
      <div class="ttl">${e.title}</div>
      <div class="badges">
        <span class="tag" style="background:${ATTR_HEX[e.attr]||'#888'}">${e.attr}</span>
        ${e.coBU?`<span class="tag" style="background:#6b7785">协同 ${e.coBU}</span>`:''}
        ${e.days>1?`<span class="tag days">${e.days} 天</span>`:''}
        ${e.newClient==='VIP'?`<span class="tag vip">仅限邀请</span>`:''}
        ${e.week?`<span class="tag light">${e.week}</span>`:''}
      </div>
      <div class="info"><span>🕒 ${e.time}</span><span>📍 ${e.venue}</span>${e.cap?`<span>🎟 ${e.reg!=null?e.reg+'/':''}${e.cap} 人</span>`:''}</div>
    </div>
  </div>`;
}
function grid(evs){return `<div class="ev-grid">${evs.map(evCard).join('')}</div>`;}
function gridByMonth(evs){
  const ms=[...new Set(evs.map(e=>e.month))];
  return ms.map(m=>`<div class="month-tag">📅 ${fmtMo(m)}　${m?m.split('-')[0]:''}　·　${evs.filter(e=>e.month===m).length} 场</div>${grid(evs.filter(e=>e.month===m))}`).join('');
}
const byDate=(a,b)=>(a.start||'9').localeCompare(b.start||'9');

/* render content (time / region view) */
function render(){
  const list=filtered();
  if(!list.length){timeline.innerHTML='<div class="empty-note">没有匹配的活动</div>';return;}
  let html='';
  if(viewMode==='region'){
    const order=regionsSorted().filter(r=>list.some(e=>e.region===r));
    html=order.map(r=>{
      const evs=list.filter(e=>e.region===r).sort(byDate);
      return `<div class="tl-sec"><div class="sec-h"><span class="sdot" style="background:${regHex(r)}"></span>${regFlag(r)} ${r}<span class="cnt" style="background:${regHex(r)}">${evs.length}</span></div>${grid(evs)}</div>`;
    }).join('');
  } else {
    const undated=list.filter(e=>!e.start);
    const up=list.filter(e=>e.start&&!isPast(e)).sort(byDate);
    const past=list.filter(isPast).sort(byDate);
    if(up.length) html+=`<div class="tl-sec"><div class="sec-h"><span class="sdot"></span>进行中 / 即将开展<span class="cnt" style="background:var(--s-open)">${up.length}</span></div>${gridByMonth(up)}</div>`;
    if(undated.length) html+=`<div class="tl-sec tbd"><div class="sec-h"><span class="sdot"></span>待定 / 未定档<span class="cnt" style="background:var(--s-plan)">${undated.length}</span></div>${grid(undated)}</div>`;
    if(past.length) html+=`<div class="tl-sec dim collapsed"><div class="sec-h sec-toggle"><span class="caret">▸</span><span class="sdot"></span>已过期<span class="cnt" style="background:var(--s-closed)">${past.length}</span></div><div class="sec-body">${gridByMonth(past)}</div></div>`;
  }
  timeline.innerHTML=html;
}

/* modal: 海报 / 文案 / 详情 */
function rowsHtml(e){
  const dr=e.start?(e.end&&e.end!==e.start?`${e.start.replace(/-/g,'.')} – ${e.end.slice(5).replace('-','.')}（${e.days}天）`:`${e.start.replace(/-/g,'.')} ${e.weekday}`):'日期待定';
  const rows=[['地区',`${regFlag(e.region)} ${e.region}`],['日期',dr],['时间',e.time],['场地',e.venue],
    ['属性',e.attr],['报名',e.status+(e.cap?` · 容纳 ${e.reg!=null?e.reg+'/':''}${e.cap} 人`:'')],
    e.guest?['主讲/嘉宾',e.guest]:null,e.target?['目标客群',e.target]:null].filter(Boolean);
  return rows.map(r=>`<div class="dt-r"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join('');
}
function openInvite(id){
  const e=EVENTS.find(x=>x.id===id); if(!e)return;
  const img=INVITE_IMG[id], c=INVITE_COPY[id];
  const T=[],P=[];
  if(img){T.push(['poster','🖼 海报']);P.push(['poster',`<img src="${encodeURI(img)}" alt="${e.title}" onerror="this.parentNode.innerHTML='<div class=ldfail>海报暂未上传</div>'">`]);}
  if(c){T.push(['copy','📝 文案']);P.push(['copy',`<div class="copy-text">${c.text.replace(/</g,'&lt;')}</div>${c.signup?`<div class="copy-signup">${c.signup}</div>`:''}<button class="copybtn" onclick="copyInviteText(${id},this)">📋 复制文案到剪贴板</button>`]);}
  T.push(['info','ℹ️ 详情']);P.push(['info',`<div class="dt-rows">${rowsHtml(e)}<div class="dt-sl">诺亚　懂金融，更懂华人。</div></div>`]);
  const tabsHtml=T.length>1?`<div class="iv-tabs">${T.map((t,i)=>`<button class="iv-tab ${i===0?'on':''}" data-tab="${t[0]}">${t[1]}</button>`).join('')}</div>`:'';
  const panesHtml=P.map((p,i)=>`<div class="iv-pane ${p[0]} ${i===0?'on':''}">${p[1]}</div>`).join('');
  modal.innerHTML=`<div class="detail"><button class="dt-close">×</button>
    <div class="dt-band" style="background:${regHex(e.region)}"><div class="dt-loc">${regFlag(e.region)} ${e.region}　·　${e.newClient==='VIP'?'仅限邀请':'开放新客'}</div><div class="dt-title">${e.title}</div></div>
    ${tabsHtml}${panesHtml}</div>`;
  modal.classList.add('show');
}
function closeDetail(){modal.classList.remove('show');}
function copyInviteText(id,btn){const c=INVITE_COPY[id];if(!c)return;const t=c.text+(c.signup?'\n\n'+c.signup:'');const done=()=>{const o=btn.textContent;btn.textContent='✅ 已复制';setTimeout(()=>btn.textContent=o,1800);};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(()=>fbCopy(t,done));}else fbCopy(t,done);}
function fbCopy(t,done){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();try{document.execCommand('copy');done();}catch(e){}document.body.removeChild(a);}

/* events */
document.getElementById('filters').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;const t=c.dataset.t,v=c.dataset.v||null;if(t==='region'){if(!v)fRegion.clear();else fRegion.has(v)?fRegion.delete(v):fRegion.add(v);}else if(t==='attr')fAttr=v;else fStatus=v;renderChips();renderRegionBar();render();});
document.getElementById('regionBar').addEventListener('click',e=>{const c=e.target.closest('.rb-card');if(!c)return;{const r=c.dataset.region;fRegion.has(r)?fRegion.delete(r):fRegion.add(r);}renderChips();renderRegionBar();render();timeline.scrollIntoView({behavior:'smooth',block:'start'});});
document.getElementById('searchInput').addEventListener('input',e=>{fSearch=e.target.value;render();});
document.getElementById('vTime').addEventListener('click',()=>{viewMode='time';vTime.classList.add('on');vRegion.classList.remove('on');render();});
document.getElementById('vRegion').addEventListener('click',()=>{viewMode='region';vRegion.classList.add('on');vTime.classList.remove('on');render();});
document.getElementById('timeline').addEventListener('click',e=>{const t=e.target.closest('.sec-toggle');if(t){t.closest('.tl-sec').classList.toggle('collapsed');return;}const c=e.target.closest('.ev');if(c)openInvite(+c.dataset.id);});
document.getElementById('modal').addEventListener('click',e=>{
  const tab=e.target.closest('.iv-tab');
  if(tab){const d=tab.closest('.detail');d.querySelectorAll('.iv-tab').forEach(b=>b.classList.toggle('on',b===tab));d.querySelectorAll('.iv-pane').forEach(p=>p.classList.toggle('on',p.classList.contains(tab.dataset.tab)));return;}
  if(e.target.id==='modal'||e.target.closest('.dt-close'))closeDetail();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

/* init */
genDate.textContent='⏱ 更新于 '+TODAY;
(function(){const ds=EVENTS.filter(e=>e.start).map(e=>e.start).sort();if(ds.length)mPeriod.textContent='📅 '+ds[0].slice(0,7).replace('-','.')+' – '+ds[ds.length-1].slice(0,7).replace('-','.');})();
renderKPIs();renderRegionBar();renderRegionDist();renderDonut();renderMonthBars();renderStatus();renderChips();render();
/* 国旗等 emoji 用 Twemoji 渲染为图片(兼容 Windows) */
let _obs;function twe(){if(!window.twemoji)return;_obs&&_obs.disconnect();twemoji.parse(document.body,{base:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/',folder:'svg',ext:'.svg'});_obs&&_obs.observe(document.body,{childList:true,subtree:true});}
_obs=new MutationObserver(()=>{clearTimeout(window._tt);window._tt=setTimeout(twe,40);});_obs.observe(document.body,{childList:true,subtree:true});twe();
</script>
