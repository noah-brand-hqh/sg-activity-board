<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOAH ARK Wealth · 新加坡活动看板</title>
<style>
  :root{
    --navy:#0B1F3A; --navy2:#13294B; --ink:#1c2733;
    --gold:#C8A45C; --gold-d:#A8843C;
    --ivory:#F7F5F0; --paper:#ffffff; --line:#e7e3da;
    --muted:#7a8290;
    /* attribute colors */
    --c-salon:#5B8DEF; --c-eco:#C8A45C; --c-tour:#2E9E5B;
    --c-road:#E0762B; --c-taste:#A05CC8; --c-edu:#3FB6C4;
    /* status colors */
    --s-plan:#E0A100; --s-open:#2E9E5B; --s-full:#1B6B3A;
    --s-closed:#9AA0A6; --s-cancel:#D14343; --s-na:#B6BCC6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI","PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
    background:var(--ivory);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px 64px}

  /* header */
  header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:#fff;
    padding:34px 0 30px;position:relative;overflow:hidden}
  header::after{content:"";position:absolute;left:0;bottom:0;height:4px;width:100%;
    background:linear-gradient(90deg,var(--gold),var(--gold-d))}
  .head-in{max-width:1240px;margin:0 auto;padding:0 24px;position:relative;z-index:2}
  .brand{font-size:13px;letter-spacing:3px;color:var(--gold);font-weight:600;text-transform:uppercase}
  h1{font-size:30px;font-weight:700;margin:6px 0 4px}
  .sub{color:#c7d2e0;font-size:14px}
  .meta{margin-top:14px;display:flex;flex-wrap:wrap;gap:10px}
  .meta span{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    border-radius:999px;padding:5px 13px;font-size:12.5px;color:#dde6f0}
  .scroll{position:absolute;right:-30px;top:-20px;font-size:240px;line-height:1;
    color:rgba(200,164,92,.07);font-family:Georgia,serif;z-index:1;user-select:none}

  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin:-26px 0 26px;position:relative;z-index:3}
  .kpi{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;
    box-shadow:0 6px 20px rgba(11,31,58,.06)}
  .kpi .n{font-size:30px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
  .kpi .n small{font-size:14px;font-weight:600;color:var(--muted);margin-left:2px}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:3px}
  .kpi.accent .n{color:var(--gold-d)}

  /* layout */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:20px 22px;
    box-shadow:0 4px 16px rgba(11,31,58,.04)}
  .card h2{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .card h2::before{content:"";width:4px;height:15px;background:var(--gold);border-radius:2px}

  /* donut */
  .donut-row{display:flex;align-items:center;gap:24px}
  .donut{flex:0 0 168px}
  .legend{flex:1;display:flex;flex-direction:column;gap:9px}
  .lg{display:flex;align-items:center;gap:9px;font-size:13px}
  .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .lg .nm{flex:1;color:#37414f}
  .lg .vl{font-weight:700;color:var(--navy)}
  .lg .pc{color:var(--muted);font-size:11.5px;width:38px;text-align:right}

  /* bars */
  .bars{display:flex;flex-direction:column;gap:13px;margin-top:4px}
  .bar{display:flex;align-items:center;gap:12px;font-size:13px}
  .bar .blab{width:64px;color:#37414f;font-weight:600}
  .bar .track{flex:1;background:#eef0f3;border-radius:7px;height:22px;position:relative;overflow:hidden}
  .bar .fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--navy2),#2c4a7a);
    display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11.5px;font-weight:700;min-width:24px}
  .bar.empty .fill{background:#d7dbe1}

  /* status seg */
  .segbar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin-bottom:14px;border:1px solid var(--line)}
  .segbar i{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11.5px;font-weight:700}
  .seglegend{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seglegend .lg{font-size:12.5px}

  /* filters */
  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:16px}
  .toolbar .tt{font-size:13px;color:var(--muted);margin-right:4px;font-weight:600}
  .chip{border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:6px 14px;
    font-size:12.5px;cursor:pointer;color:#445;transition:all .15s;user-select:none}
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

  /* timeline */
  .month-grp{margin-bottom:26px}
  .month-h{display:flex;align-items:center;gap:12px;margin:0 0 14px}
  .month-h .mt{font-size:18px;font-weight:800;color:var(--navy)}
  .month-h .me{font-size:13px;color:var(--muted)}
  .month-h .mc{margin-left:auto;font-size:12px;color:var(--gold-d);font-weight:700;
    background:#faf6ec;border:1px solid #ece1c6;border-radius:999px;padding:3px 11px}
  .month-h .ln{flex:1;height:1px;background:var(--line);max-width:0} /* spacer not used */

  .ev{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:0;margin-bottom:12px;
    display:grid;grid-template-columns:78px 1fr;overflow:hidden;box-shadow:0 3px 12px rgba(11,31,58,.04);transition:transform .12s,box-shadow .12s}
  .ev:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(11,31,58,.10)}
  .ev .date{background:var(--navy);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 6px;position:relative}
  .ev .date .d{font-size:24px;font-weight:800;line-height:1}
  .ev .date .mo{font-size:11px;color:#c7d2e0;margin-top:2px}
  .ev .date .wd{font-size:10.5px;color:#9fb0c4;margin-top:5px}
  .ev .date .attrbar{position:absolute;left:0;top:0;bottom:0;width:5px}
  .ev .body{padding:13px 16px 14px;position:relative}
  .ev .ttl{font-size:14.5px;font-weight:700;color:var(--ink);padding-right:96px;line-height:1.35}
  .ev .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:11px;font-weight:600;border-radius:6px;padding:2px 8px;color:#fff}
  .tag.attr{}
  .tag.light{background:#f0f2f5;color:#475;border:1px solid #e3e6ea}
  .tag.days{background:#eef6ff;color:#2b5e9e;border:1px solid #d4e6fb}
  .tag.newc{background:#fbf3df;color:#8a6a17;border:1px solid #efe0b8}
  .tag.vip{background:#f3e8fb;color:#7a3ca8;border:1px solid #e6cef7}
  .ev .info{display:flex;flex-wrap:wrap;gap:14px;margin-top:9px;font-size:12px;color:#54606e}
  .ev .info b{color:#37414f;font-weight:600}
  .ev .note{margin-top:8px;font-size:11.5px;color:var(--muted);font-style:italic;border-left:2px solid var(--gold);padding-left:9px}
  .status{position:absolute;top:13px;right:14px;font-size:11px;font-weight:700;border-radius:999px;padding:3px 11px;color:#fff;white-space:nowrap}
  .ev{cursor:pointer}
  .ev .cue{margin-top:9px;font-size:11.5px;font-weight:600;color:#aeb4bd;text-align:right;transition:color .15s}
  .ev:hover .cue{color:var(--gold-d)}

  /* invitation modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(7,16,30,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:100}
  .modal-overlay.show{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .invite{background:var(--paper);width:100%;max-width:500px;border-radius:18px;overflow:hidden;position:relative;
    box-shadow:0 30px 80px rgba(0,0,0,.4);animation:pop .25s cubic-bezier(.2,.8,.3,1.2);max-height:92vh;overflow-y:auto}
  @keyframes pop{from{transform:translateY(18px) scale(.97);opacity:0}to{transform:none;opacity:1}}
  .iv-close{position:absolute;top:12px;right:14px;width:30px;height:30px;border-radius:50%;border:none;
    background:rgba(255,255,255,.18);color:#fff;font-size:20px;line-height:1;cursor:pointer;z-index:3}
  .iv-close:hover{background:rgba(255,255,255,.32)}
  .iv-band{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:26px 30px 22px;text-align:center;position:relative}
  .iv-brand{font-size:12px;letter-spacing:3px;color:var(--gold);font-weight:700}
  .iv-kicker{font-size:13px;letter-spacing:4px;margin-top:12px;color:#dbe4f0}
  .iv-attr{display:inline-block;margin-top:14px;font-size:12px;font-weight:700;color:#fff;border-radius:999px;padding:3px 14px}
  .iv-body{padding:24px 30px 26px}
  .iv-title{font-size:19px;font-weight:800;color:var(--navy);line-height:1.4;text-align:center}
  .iv-intro{font-size:13.5px;color:#46505c;line-height:1.85;margin:16px 0 20px;text-align:justify}
  .iv-rows{border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);padding:6px 0}
  .iv-r{display:flex;gap:14px;padding:9px 2px;font-size:13px;border-bottom:1px solid #f2f0ea}
  .iv-r:last-child{border-bottom:none}
  .iv-r .k{flex:0 0 84px;color:var(--gold-d);font-weight:700}
  .iv-r .v{flex:1;color:#33404e}
  .iv-note{margin-top:14px;font-size:12.5px;color:#7a6326;background:#faf6ec;border:1px solid #ece1c6;border-radius:10px;padding:10px 13px}
  .iv-rsvp{margin-top:20px;text-align:center;font-size:11.5px;color:var(--muted);letter-spacing:.5px}
  .iv-sl{margin-top:8px;text-align:center;font-size:14px;font-weight:800;color:var(--navy);letter-spacing:1px}
  /* 真实海报邀请函 */
  .img-invite{max-width:440px;background:#11161d;padding:0}
  .img-invite img{display:block;width:100%;height:auto;border-radius:18px}
  .img-invite .iv-close{background:rgba(0,0,0,.45);z-index:4}
  .img-invite .iv-close:hover{background:rgba(0,0,0,.7)}
  /* 海报 / 文案 切换 */
  .iv-tabs{display:flex;gap:6px;padding:10px 12px;background:#0c1118}
  .iv-tab{flex:1;border:none;background:rgba(255,255,255,.08);color:#cdd5e0;font-size:12.5px;font-weight:700;
    padding:9px;border-radius:9px;cursor:pointer;transition:.15s}
  .iv-tab:hover{background:rgba(255,255,255,.16)}
  .iv-tab.on{background:var(--gold);color:#1a1205}
  .iv-pane{display:none}
  .iv-pane.on{display:block}
  .iv-pane.copy{background:#fff;padding:24px 24px 26px}
  .copy-text{font-size:14px;line-height:1.95;color:#2a3340;white-space:pre-wrap}
  .copy-signup{margin-top:18px;padding:13px 15px;background:#faf6ec;border:1px solid #ece1c6;border-radius:10px;
    font-size:13px;color:#7a6326;font-weight:700;white-space:pre-wrap;line-height:1.8}
  .copybtn{margin-top:16px;width:100%;border:none;background:var(--navy);color:#fff;font-size:13.5px;font-weight:700;
    padding:12px;border-radius:10px;cursor:pointer;transition:.15s}
  .copybtn:hover{background:var(--navy2)}

  .empty-note{text-align:center;color:var(--muted);font-size:13px;padding:30px;border:1px dashed var(--line);border-radius:12px}

  /* timeline sections */
  .tl-sec{margin-bottom:8px}
  .sec-h{font-size:13px;font-weight:800;letter-spacing:.5px;color:var(--navy);margin:6px 0 16px;
    display:flex;align-items:center;gap:10px}
  .sec-h::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--s-open)}
  .sec-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .tl-sec.dim .sec-h{color:var(--muted)}
  .tl-sec.dim .sec-h::before{background:var(--s-closed)}
  .tl-sec.dim .ev{opacity:.66}
  .tl-sec.dim .ev:hover{opacity:1}
  .sec-toggle{cursor:pointer;user-select:none}
  .sec-toggle .caret{display:inline-block;transition:transform .2s;font-size:11px;color:var(--muted)}
  .tl-sec:not(.collapsed) .sec-toggle .caret{transform:rotate(90deg)}
  .sec-toggle .hint{font-size:11px;font-weight:600;color:var(--muted);background:#f0f2f5;border-radius:999px;padding:2px 9px;margin-left:2px;order:3}
  .sec-toggle:hover{color:var(--navy)}
  .tl-sec.collapsed .sec-body{display:none}

  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;padding-top:18px;border-top:1px solid var(--line)}
  footer .sl{color:var(--navy);font-weight:700;font-size:13px;letter-spacing:.5px}

  /* 访问口令门（仅网络访问时显示，本地打开不拦） */
  .gate{position:fixed;inset:0;z-index:200;background:linear-gradient(135deg,var(--navy),var(--navy2));
    display:flex;align-items:center;justify-content:center;padding:24px}
  .gate-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:18px;
    padding:38px 34px;width:100%;max-width:360px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .gate-brand{font-size:12px;letter-spacing:3px;color:var(--gold);font-weight:700}
  .gate-title{font-size:24px;font-weight:800;color:#fff;margin:10px 0 4px}
  .gate-sub{font-size:13px;color:#c7d2e0;margin-bottom:22px}
  .gate-card input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.1);color:#fff;font-size:15px;outline:none;text-align:center;letter-spacing:2px}
  .gate-card input:focus{border-color:var(--gold)}
  .gate-card button{width:100%;margin-top:14px;padding:12px;border:none;border-radius:10px;
    background:linear-gradient(90deg,var(--gold),var(--gold-d));color:#1a1205;font-size:15px;font-weight:800;cursor:pointer}
  .gate-card button:hover{filter:brightness(1.06)}
  .gate-err{display:none;color:#ffb4b4;font-size:12.5px;margin-top:12px}
  .gate-foot{margin-top:24px;font-size:11px;color:#8aa0bd}
  @media(max-width:980px){.kpis{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.donut-row{flex-direction:column}.seglegend{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="scroll">&#119188;</div>
  <div class="head-in">
    <div class="brand">ARK Wealth · Singapore</div>
    <h1>SG活动看板</h1>
    <div class="sub">客户经营活动日历 · 月历 / 属性 / 状态全景视图</div>
    <div class="meta">
      <span>📅 周期 2026.05 – 2026.10</span>
      <span>🔁 节奏 1–2 场 / 周</span>
      <span>📍 ARK Singapore</span>
      <span id="genDate">⏱ 数据更新 —</span>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- KPIs -->
  <div class="kpis" id="kpis"></div>

  <!-- timeline (front focus) -->
  <div class="card">
    <h2>活动明细时间线 <span style="font-weight:500;font-size:12px;color:var(--muted);margin-left:6px">点击任一活动可查看邀请函</span></h2>
    <div class="toolbar" id="toolbar">
      <span class="tt">属性</span><span id="attrChips"></span>
      <span class="tt" style="margin-left:8px">状态</span><span id="statusChips"></span>
    </div>
    <div id="timeline"></div>
  </div>

  <!-- secondary charts -->
  <div class="grid2">
    <div class="card">
      <h2>按活动属性分布</h2>
      <div class="donut-row">
        <div class="donut"><svg id="donut" viewBox="0 0 42 42"></svg></div>
        <div class="legend" id="attrLegend"></div>
      </div>
    </div>
    <div class="card">
      <h2>客群开放度 &amp; 形态</h2>
      <div class="bars" id="openBars"></div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <h2>按月份分布</h2>
      <div class="bars" id="monthBars"></div>
    </div>
    <div class="card">
      <h2>报名状态分布</h2>
      <div class="segbar" id="statusSeg"></div>
      <div class="seglegend" id="statusLegend"></div>
    </div>
  </div>

  <footer>
    <div class="sl">诺亚　懂金融，更懂华人。</div>
    <div style="margin-top:6px">诺亚 · ARK Wealth Singapore</div>
  </footer>
</div>

<div id="modal" class="modal-overlay"></div>

<script>
const ATTR_COLORS={
  '沙龙':'var(--c-salon)','生态合作活动':'var(--c-eco)','海外考察':'var(--c-tour)',
  '路演':'var(--c-road)','品鉴':'var(--c-taste)','投教':'var(--c-edu)','家族传承':'#B5476B'
};
const ATTR_HEX={
  '沙龙':'#5B8DEF','生态合作活动':'#C8A45C','海外考察':'#2E9E5B',
  '路演':'#E0762B','品鉴':'#A05CC8','投教':'#3FB6C4','家族传承':'#B5476B'
};
const STATUS_HEX={
  '筹备中':'#E0A100','已开放报名':'#2E9E5B','已满':'#1B6B3A',
  '已结束':'#9AA0A6','取消':'#D14343','未设置':'#B6BCC6'
};
const MONTHS=['2026-05','2026-06','2026-07','2026-08','2026-09','2026-10'];

const EVENTS=[
 {id:1,start:'2026-04-22',days:1,week:'W17',month:'2026-04',weekday:'周三',time:'14:00–17:00',title:'「投资下午茶」首期雅聚：AI 时代下的子女教育',attr:'沙龙',newClient:'Y',target:'',venue:'ARK Singapore Office',cap:null,status:'已结束',note:''},
 {id:2,start:'2026-05-12',days:1,week:'W20',month:'2026-05',weekday:'周二',time:'14:00–17:00',title:'诺亚 Ark 新加坡 × Glory 同业考察游学沙龙',attr:'生态合作活动',newClient:'Y',target:'',venue:'ARK Singapore Office',cap:null,status:'已结束',note:''},
 {id:3,start:'2026-05-14',end:'2026-05-16',days:3,week:'W20',month:'2026-05',weekday:'周四',time:'D1 18:00–21:00 / D2 全天 / D3 上午',title:'走进新加坡 · 首期',attr:'海外考察',newClient:'Y',target:'',venue:'ARK Singapore Office',cap:30,status:'已结束',note:'重点：2026 H2 配置主线 / 美债转向'},
 {id:4,start:'2026-05-26',days:1,week:'W22',month:'2026-05',weekday:'周二',time:'19:00–21:00',title:'Beyond Festivals · 走进新加坡多元文化 — Noah × Lion English VIP 沙龙',attr:'生态合作活动',newClient:'Y',target:'',venue:'私人会所',cap:20,status:'已结束',note:'限 10 对夫妇 / 配偶随行'},
 {id:5,start:'2026-06-05',days:1,week:'W23',month:'2026-06',weekday:'周五',time:'14:30–16:00',title:'投资日本：三井住友探寻日股投资机会',attr:'路演',newClient:'Y',target:'',venue:'ARK Singapore Office',cap:30,status:'已结束',note:'投教序列第 3 期 / 含 Q&A'},

/* ---------- KPIs ---------- */

}

/* ---------- counts ---------- */
function countBy(key){const m={};EVENTS.forEach(e=>{m[e[key]]=(m[e[key]]||0)+1});return m;}

/* ---------- donut (attribute) ---------- */
function renderDonut(){
  const counts=countBy('attr');
  const order=['生态合作活动','海外考察','品鉴','家族传承','沙龙','路演','投教'].filter(a=>counts[a]);
  const total=EVENTS.length;
  let svg='<circle cx="21" cy="21" r="15.915" fill="none" stroke="#eef0f3" stroke-width="6"/>';
  let off=25; // start at top
  order.forEach(a=>{
    const pct=counts[a]/total*100;
    svg+=`<circle cx="21" cy="21" r="15.915" fill="none" stroke="${ATTR_HEX[a]}" stroke-width="6" stroke-dasharray="${pct} ${100-pct}" stroke-dashoffset="${off}"/>`;
    off=(off-pct+100)%100;
  });
  svg+=`<text x="21" y="20.5" text-anchor="middle" font-size="8" font-weight="800" fill="#0B1F3A">${total}</text>`;
  svg+=`<text x="21" y="26" text-anchor="middle" font-size="3.4" fill="#7a8290">场活动</text>`;
  document.getElementById('donut').innerHTML=svg;
  document.getElementById('attrLegend').innerHTML=order.map(a=>
    `<div class="lg"><span class="dot" style="background:${ATTR_HEX[a]}"></span><span class="nm">${a}</span><span class="vl">${counts[a]}</span><span class="pc">${Math.round(counts[a]/total*100)}%</span></div>`).join('');
}

/* ---------- month bars ---------- */
function renderMonthBars(){
  const counts=countBy('month');
  // include 04 as pre-period plus the 6 period months
  const months=['2026-04',...MONTHS];
  const max=Math.max(1,...months.map(m=>counts[m]||0));
  document.getElementById('monthBars').innerHTML=months.map(m=>{
    const v=counts[m]||0;
    const w=v? (v/max*100):3;
    return `<div class="bar ${v?'':'empty'}"><div class="blab">${fmtMonthCn(m)}</div><div class="track"><div class="fill" style="width:${w}%">${v||''}</div></div></div>`;
  }).join('');
}

/* ---------- timeline ---------- */
const isClosed=e=>e.status==='已结束'||e.status==='取消';
function renderTimeline(){
  const list=EVENTS.filter(e=>(!fAttr||e.attr===fAttr)&&(!fStatus||e.status===fStatus));
  const tl=document.getElementById('timeline');
  if(!list.length){tl.innerHTML='<div class="empty-note">当前筛选条件下没有活动</div>';return;}
  const active=list.filter(e=>!isClosed(e)).sort((a,b)=>a.start.localeCompare(b.start));
  const closed=list.filter(isClosed).sort((a,b)=>a.start.localeCompare(b.start));
  let html='';
  if(active.length) html+=section('进行中 / 即将开展',active,false);
  if(closed.length) html+=section('已结束',closed,true);
  tl.innerHTML=html;
}
function section(label,evs,dim){
  const months=[...new Set(evs.map(e=>e.month))]; // already date-sorted
  const body=months.map(m=>{
    const me=evs.filter(e=>e.month===m);
    return `<div class="month-grp">
      <div class="month-h"><span class="mt">${fmtMonthCn(m)}</span><span class="me">${m.split('-')[0]}</span><span class="mc">${me.length} 场</span></div>
      ${me.map(evCard).join('')}
    </div>`;
  }).join('');
  if(dim){ // 已结束：默认折叠，点击展开
    return `<div class="tl-sec dim collapsed">
      <div class="sec-h sec-toggle"><span class="caret">▸</span>${label} · ${evs.length} 场<span class="hint">点击展开</span></div>
      <div class="sec-body">${body}</div>
    </div>`;
  }
  return `<div class="tl-sec"><div class="sec-h">${label} · ${evs.length} 场</div>${body}</div>`;
}
// 折叠/展开 已结束 分区

function evCard(e){
  const dateRange=e.end?`${dayOf(e.start)}–${dayOf(e.end)}`:dayOf(e.start);
  const newcTag=e.newClient==='VIP'
    ? '<span class="tag vip">VIP 仅限邀请</span>'
    : '<span class="tag newc">开放新客</span>';
  return `<div class="ev" data-id="${e.id}">
    <div class="date">
      <span class="attrbar" style="background:${ATTR_HEX[e.attr]}"></span>
      <span class="d">${dateRange}</span>
      <span class="mo">${fmtMonthCn(e.month)}</span>
      <span class="wd">${e.weekday}</span>
    </div>
    <div class="body">
      <span class="status" style="background:${STATUS_HEX[e.status]}">${e.status}</span>
      <div class="ttl">${e.title}</div>
      <div class="badges">
        <span class="tag attr" style="background:${ATTR_HEX[e.attr]}">${e.attr}</span>
        ${e.days>1?`<span class="tag days">${e.days} 天</span>`:''}
        ${newcTag}
        <span class="tag light">${e.week}</span>
      </div>
      <div class="info">
        <span>🕒 <b>${e.time}</b></span>
        <span>📍 ${e.venue}</span>
        ${e.cap?`<span>🎟 容纳 <b>${e.cap}</b> 人</span>`:''}
      </div>
      ${e.note?`<div class="note">${e.note}</div>`:''}
      <div class="cue">📨 点击查看邀请函 →</div>
    </div>
  </div>`;
}

  const txt=c.text+(c.signup?'\n\n'+c.signup:'');
  const done=()=>{const o=btn.textContent;btn.textContent='✅ 已复制';setTimeout(()=>btn.textContent=o,1800);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));}
  else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');done();}catch(e){}
  document.body.removeChild(ta);
}
function renderTextInvite(id){
  document.getElementById('modal').innerHTML=buildTextInvite(id);
}
function buildTextInvite(id){
  const e=EVENTS.find(x=>x.id===id);
  const intro=INVITE_INTRO[e.attr]||'诚邀您拨冗出席本场活动，与诺亚 Ark 一同度过一段值得期待的时光。';
  const dateLine=e.end
    ? `${e.start.replace(/-/g,'.')} – ${e.end.slice(5).replace('-','.')}（${e.days} 天）`
    : `${e.start.replace(/-/g,'.')}　${e.weekday}`;
  const rows=[
    ['日期',dateLine],
    ['时间',e.time],
    ['地点 / 形式',e.venue],
    e.cap?['名额',`限 ${e.cap} 位 · 敬请尽早回复`]:null,
  ].filter(Boolean);
  return `<div class="invite" role="dialog" aria-modal="true">
    <button class="iv-close" aria-label="关闭">×</button>
    <div class="iv-band" style="border-top:4px solid ${ATTR_HEX[e.attr]}">
      <div class="iv-brand">ARK&nbsp;WEALTH&nbsp;·&nbsp;SINGAPORE</div>
      <div class="iv-kicker">诚 挚 邀 请　·　INVITATION</div>
      <div class="iv-attr" style="background:${ATTR_HEX[e.attr]}">${e.attr}</div>
    </div>
    <div class="iv-body">
      <h3 class="iv-title">${e.title}</h3>
      <p class="iv-intro">${intro}</p>
      <div class="iv-rows">
        ${rows.map(r=>`<div class="iv-r"><span class="k">${r[0]}</span><span class="v">${r[1]}</span></div>`).join('')}
      </div>
      ${e.note?`<div class="iv-note">亮点 · ${e.note}</div>`:''}
      <div class="iv-rsvp">敬请于活动前回复您的莅临　|　RSVP　·　ARK Wealth Singapore</div>
      <div class="iv-sl">诺亚　懂金融，更懂华人。</div>
    </div>
  </div>`;
}
function closeInvite(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',e=>{
  const tab=e.target.closest('.iv-tab');
  if(tab){
    const inv=tab.closest('.invite');
    inv.querySelectorAll('.iv-tab').forEach(b=>b.classList.toggle('on',b===tab));
    inv.querySelectorAll('.iv-pane').forEach(p=>p.classList.toggle('on',p.classList.contains(tab.dataset.tab)));
    return;
  }
  if(e.target.id==='modal'||e.target.closest('.iv-close')) closeInvite();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeInvite();});

/* init */
document.getElementById('genDate').textContent='⏱ 数据更新 2026-06-08';
renderKPIs();renderDonut();renderMonthBars();renderStatus();renderOpenBars();renderChips();renderTimeline();
</script>
